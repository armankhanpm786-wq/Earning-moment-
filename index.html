<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Developer Rewards</title>

<!-- MONETAG SDK -->
<script src='//libtl.com/sdk.js'
data-zone='10959136'
data-sdk='show_10959136'></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover;
    height:100vh;
    color:white;
}

.overlay{
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.75);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    background:rgba(15,23,42,0.95);
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(37,99,235,0.5);
}

.logo{
    width:100px;
    height:100px;
    border-radius:25px;
    margin-bottom:15px;
    border:3px solid #2563eb;
}

h1{
    font-size:28px;
    margin-bottom:5px;
}

.dev{
    color:#94a3b8;
    margin-bottom:20px;
}

.balance-box{
    background:#1e293b;
    padding:15px;
    border-radius:18px;
    margin-bottom:20px;
    font-size:22px;
    font-weight:bold;
}

.btn{
    width:100%;
    padding:15px;
    margin-top:12px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.watch{
    background:#2563eb;
}

.withdraw{
    background:#16a34a;
}

.referral{
    background:#ea580c;
}

.footer{
    margin-top:20px;
    color:#cbd5e1;
    font-size:14px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<img class="logo"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h1>Future Developer</h1>

<div class="dev">
Developer By Amir Hamza
</div>

<div class="balance-box">
💰 Balance:
<span id="balance">0</span> Coins
</div>

<button class="btn watch" onclick="watchAd()">
🎁 Watch Ads
</button>

<button class="btn withdraw">
💸 Withdraw
</button>

<button class="btn referral">
👥 Referral
</button>

<div class="footer">
Organization: Future Developer
</div>

</div>

</div>

<script>

/* BALANCE SYSTEM */

let balance = localStorage.getItem("coins") || 0;

document.getElementById("balance").innerText = balance;

function updateBalance(){

    localStorage.setItem("coins", balance);

    document.getElementById("balance").innerText = balance;

}

/* REWARDED INTERSTITIAL */

function watchAd(){

    show_10959136().then(() => {

        balance = parseInt(balance) + 10;

        updateBalance();

        alert("10 Coins Added!");

    }).catch(() => {

        alert("Ads Not Available");

    });

}

/* REWARDED POPUP AUTO ADS */

setInterval(() => {

    show_10959136('pop').catch(()=>{});

}, 60000);

/* IN-APP INTERSTITIAL AUTO ADS */

show_10959136({
  type: 'inApp',
  inAppSettings: {
    frequency: 2,
    capping: 0.1,
    interval: 30,
    timeout: 5,
    everyPage: false
  }
});

</script>

</body>
</html>
