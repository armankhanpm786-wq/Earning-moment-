<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earning Moment</title>

<script src="https://ad.gigapub.tech/script?id=6553"></script>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 420px;
  margin: auto;
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00c853;
  color: white;
  font-size: 16px;
}

h2 {
  margin-bottom: 5px;
}

.small {
  font-size: 12px;
  color: gray;
}

.footer {
  margin-top: 15px;
  font-size: 13px;
}

.footer a {
  color: gray;
  text-decoration: none;
  margin: 0 8px;
}
</style>
</head>

<body>

<div class="box">

<h2>💰 Earning Moment</h2>
<div class="small">Future Developer BD<br>Md Amir Hamza</div>

<p>Coins: <span id="coins">0</span></p>

<button onclick="watchAd()">▶ Watch Ad 1</button>
<button onclick="watchAd()">▶ Watch Ad 2</button>
<button onclick="watchAd()">▶ Watch Ad 3</button>

<!-- FOOTER LINKS -->
<div class="footer">
  <a href="privacy.html">Privacy Policy</a> |
  <a href="about.html">About</a>
</div>

</div>

<script>

let coins = 0;

function watchAd(){

  if(typeof window.showGiga !== "function"){
    alert("Ad not ready");
    return;
  }

  window.showGiga()
    .then(()=>{
      coins += 10;
      document.getElementById("coins").innerText = coins;
      alert("You earned 10 coins!");
    })
    .catch(()=>{
      alert("No ad available");
    });

}

</script>

</body>
</html>
