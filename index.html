<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Earning App</title>

  <!-- Ads Script -->
  <script src="https://ad.gigapub.tech/script?id=6553"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
      padding-top: 50px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    h2 {
      color: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Earning App</h2>

  <p>Coins: <span id="coins">0</span></p>

  <button onclick="showAd()">Watch Ad & Earn</button>
</div>

<script>
let coins = 0;

function showAd() {
  window.showGiga()
    .then(() => {
      coins += 10; // reward
      document.getElementById("coins").innerText = coins;
      alert("You earned 10 coins!");
    })
    .catch((e) => {
      alert("Ad failed to load");
      console.log(e);
    });
}
</script>

</body>
</html>
