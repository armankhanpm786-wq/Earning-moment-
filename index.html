<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earning Pro App</title>

<script src="https://ad.gigapub.tech/script?id=6553"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 420px;
  margin: auto;
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: green;
  color: white;
}

.small {
  font-size: 12px;
  color: gray;
}

.section {
  display: none;
}
</style>
</head>

<body>

<div class="box">

<h2>💰 Earning Pro App</h2>

<div class="small">Future Developer BD<br>Md Amir Hamza</div>

<!-- LOGIN -->
<div id="loginSection">
  <h3>Login</h3>
  <input id="username" placeholder="Enter Name">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashSection" class="section">

  <h3>Welcome <span id="user"></span></h3>

  <p>Coins: <span id="coins">0</span></p>

  <button onclick="watchAd()">▶ Watch Ad 1</button>
  <button onclick="watchAd()">▶ Watch Ad 2</button>
  <button onclick="watchAd()">▶ Watch Ad 3</button>

  <hr>

  <h3>Withdraw</h3>
  <input id="method" placeholder="bKash / Nagad">
  <input id="number" placeholder="Account Number">
  <input id="amount" placeholder="Amount">

  <button onclick="withdraw()">Request Withdraw</button>

  <button onclick="adminLogin()">Admin Panel</button>
</div>

<!-- ADMIN -->
<div id="adminSection" class="section">

  <h3>Admin Panel</h3>
  <p class="small">Password required</p>

  <input id="adminPass" placeholder="Enter Password">
  <button onclick="checkAdmin()">Enter</button>

  <div id="requests"></div>
</div>

</div>

<script>

let coins = 0;
let currentUser = "";

function login(){
  currentUser = document.getElementById("username").value;

  if(!currentUser){
    alert("Enter name");
    return;
  }

  localStorage.setItem("user", currentUser);

  document.getElementById("user").innerText = currentUser;

  document.getElementById("loginSection").style.display = "none";
  document.getElementById("dashSection").style.display = "block";

  loadCoins();
}

function watchAd(){

  if(typeof window.showGiga !== "function"){
    alert("Ad not ready");
    return;
  }

  window.showGiga().then(()=>{
    coins += 10;
    saveCoins();
    document.getElementById("coins").innerText = coins;
    alert("Earned 10 coins!");
  });
}

function saveCoins(){
  localStorage.setItem("coins", coins);
}

function loadCoins(){
  coins = parseInt(localStorage.getItem("coins") || "0");
  document.getElementById("coins").innerText = coins;
}

function withdraw(){
  let method = document.getElementById("method").value;
  let number = document.getElementById("number").value;
  let amount = document.getElementById("amount").value;

  if(amount > coins){
    alert("Not enough coins");
    return;
  }

  coins -= amount;
  saveCoins();
  document.getElementById("coins").innerText = coins;

  let req = {
    user: currentUser,
    method,
    number,
    amount
  };

  localStorage.setItem("withdraw", JSON.stringify(req));

  alert("Withdraw request sent (demo)");
}

function adminLogin(){
  document.getElementById("dashSection").style.display = "none";
  document.getElementById("adminSection").style.display = "block";
}

function checkAdmin(){
  let pass = document.getElementById("adminPass").value;

  if(pass === "admin123"){
    let req = localStorage.getItem("withdraw");

    document.getElementById("requests").innerHTML =
      "<h4>Withdraw Request:</h4><pre>" + req + "</pre>";
  } else {
    alert("Wrong password");
  }
}

// auto login
if(localStorage.getItem("user")){
  document.getElementById("loginSection").style.display = "none";
  document.getElementById("dashSection").style.display = "block";
  currentUser = localStorage.getItem("user");
  document.getElementById("user").innerText = currentUser;
  loadCoins();
}

</script>

</body>
</html>
